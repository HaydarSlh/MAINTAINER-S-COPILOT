# =============================================================================
# eval_thresholds.yaml  —  THE COMMITTED CI GATES
# -----------------------------------------------------------------------------
# Per the brief: "Two golden sets. Two CI gates. Committed thresholds."
# Both eval suites run in CI on every push. eval_report.json is written every
# run, stored in MinIO blob, and diffed against the previous green build.
# Regression below these thresholds BLOCKS merge.
#
# HARD RULE (refuse-to-boot): the api refuses to boot if ANY committed
# threshold here is set to zero / disabled. These numbers must mean something.
#
# Classification thresholds set from actual test metrics (run 2026-05-20):
#   test macro-F1: 0.672  |  bug: 0.870  |  feature: 0.879  |  docs: 0.871  |  question: 0.087
# Golden set: 23 examples (7 bug, 7 feature, 7 docs, 2 question).
# Question gate is lenient — structurally hard class, documented in DECISIONS.md D2.
# Thresholds set at ~10% below observed test performance as regression margin.
# =============================================================================

classification:
  # Run against the fine-tuned DistilBERT model (deployed model).
  # Classical ML and LLM baseline results are in eval_report.json for reference.
  golden_set_size: 23
  macro_f1_min: 0.60
  per_class_f1_min:
    bug: 0.78
    feature: 0.79
    docs: 0.78
    question: 0.40   # lenient — 2 golden examples, hard boundary (see DECISIONS.md D2)

rag:
  # Retrieval metrics — measured on 25 golden triples (2026-05-22):
  #   hit@5 = 0.72  |  MRR@10 = 0.50  (structure-aware chunks, hybrid α=0.6, cross-encoder reranker)
  # Thresholds set at ~10% below observed as regression margin.
  hit_at_5_min: 0.65
  mrr_at_10_min: 0.45
  # Generation metrics (RAGAS — requires live app stack; not gated in offline CI)
  faithfulness_min: 0.75
  answer_relevancy_min: 0.75

# How much a metric may drop versus the previous green build before CI fails,
# even if still above the absolute floor above. Catches slow regressions.
regression_tolerance: 0.03
