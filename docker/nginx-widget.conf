server {
    listen 8080;

    # JS bundle assets — long cache, content-addressed filenames
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # widget.js loader — short cache so updates propagate quickly
    location = /widget.js {
        root /usr/share/nginx/html;
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
