# =============================================================================
# alembic.ini
# -----------------------------------------------------------------------------
# Alembic config for the Postgres-16 + pgvector schema.
#
# Per the brief: schema lives ENTIRELY in Alembic migrations, and a dedicated
# `migrate` compose container runs `alembic upgrade head` and EXITS before the
# `api` service is allowed to boot. No app code creates tables at runtime.
#
# The DB URL is NOT set here — it is built at runtime in alembic/env.py from
# the password resolved out of Vault (no secrets in committed files).
# =============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
